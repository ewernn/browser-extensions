<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#4a90e2"/>

  <!-- Document icon -->
  <rect x="24" y="20" width="80" height="88" rx="4" fill="white"/>

  <!-- Text lines representing content -->
  <rect x="34" y="32" width="60" height="4" rx="2" fill="#4a90e2"/>
  <rect x="34" y="44" width="50" height="4" rx="2" fill="#4a90e2"/>

  <!-- Excluded line with strikethrough (red) -->
  <rect x="34" y="56" width="55" height="4" rx="2" fill="#ff4444"/>
  <rect x="32" y="57.5" width="59" height="1" fill="#ff4444" opacity="0.8"/>

  <!-- More text lines -->
  <rect x="34" y="68" width="45" height="4" rx="2" fill="#4a90e2"/>
  <rect x="34" y="80" width="60" height="4" rx="2" fill="#4a90e2"/>
  <rect x="34" y="92" width="40" height="4" rx="2" fill="#4a90e2"/>

  <!-- Minus symbol to indicate exclusion -->
  <circle cx="96" cy="96" r="16" fill="#ff4444"/>
  <rect x="88" y="94" width="16" height="4" rx="1" fill="white"/>
</svg>